name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew :ai:testDebugUnitTest

      - name: Assemble debug
        run: ./gradlew :ai:assembleDebug

      - name: Lint
        run: ./gradlew :ai:lintDebug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-debug-apk
          path: ai/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: ai/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
